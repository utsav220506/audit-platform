<!DOCTYPE html>
<html>
<head>
  <title>Audit Platform</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container">

  <h1>📄 Audit Platform</h1>

  <!-- AUTH -->
  <div id="auth" class="card">
    <h2>Register</h2>
    <input id="reg-name" placeholder="Name">
    <input id="reg-email" placeholder="Email">
    <input id="reg-password" type="password" placeholder="Password">

    <select id="reg-role">
      <option value="STUDENT">Student</option>
      <option value="TEACHER">Teacher</option>
      <option value="HOD">HOD</option>
    </select>

    <button onclick="register()">Register</button>

    <hr>

    <h2>Login</h2>
    <input id="login-email" placeholder="Email">
    <input id="login-password" type="password">
    <button onclick="login()">Login</button>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" style="display:none">

    <div class="header">
      <h2 id="role-display"></h2>
    </div>

    <!-- STUDENT -->
    <div id="student-section" class="grid">

      <div class="card">
        <h3>Create Document</h3>
        <input id="doc-title" placeholder="Title">
        <textarea id="doc-content"></textarea>
        <button onclick="createDoc()">Create</button>
      </div>

      <div class="card">
        <h3>Your Documents</h3>
        <button onclick="getDocs()">Load</button>
        <ul id="docs"></ul>
      </div>

      <div class="card">
        <h3>Edit Document</h3>
        <input id="edit-id" placeholder="Doc ID">
        <textarea id="edit-content"></textarea>
        <button onclick="editDoc()">Update</button>
      </div>

    </div>

    <!-- TEACHER -->
    <div id="teacher-section" class="card" style="display:none">
      <h3>Audit Logs</h3>
      <button onclick="getAudit()">Load Logs</button>
      <ul id="audit"></ul>
    </div>

    <!-- HOD -->
    <div id="hod-section" class="card" style="display:none">
      <h3>Reports</h3>
      <button onclick="generateReport()">Generate Report</button>
      <canvas id="chart"></canvas>
    </div>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
