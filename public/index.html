'use strict';

const { useState, useEffect, useCallback, useRef } = React;

// ── API Helper ────────────────────────────────────────
async function api(path, opts = {}, token = null) {
  const headers = { 'Content-Type': 'application/json' };
  if (token) headers['Authorization'] = `Bearer ${token}`;
  const res = await fetch(path, {
    ...opts,
    headers: { ...headers, ...(opts.headers || {}) },
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Request failed');
  return data;
}

// ── Toast ──────────────────────────────────────────────
function Toast({ toasts }) {
  return (
    <div className="toast-container">
      {toasts.map(t => (
        <div key={t.id} className={`toast ${t.type}`}>
          <span>{t.type === 'success' ? '✓' : t.type === 'error' ? '✕' : 'ℹ'}</span>
          {t.message}
        </div>
      ))}
    </div>
  );
}

function useToast() {
  const [toasts, setToasts] = useState([]);
  const show = useCallback((message, type = 'info') => {
    const id = Date.now();
    setToasts(t => [...t, { id, message, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3000);
  }, []);
  return { toasts, show };
}

// ── Role helpers ───────────────────────────────────────
const ROLE_COLOR = { STUDENT: '#58a6ff', TEACHER: '#3fb950', HOD: '#bc8cff' };
function RoleBadge({ role }) {
  return <span className={`role-badge role-${role}`}>{role}</span>;
}
function avatarStyle(role) {
  return { background: `${ROLE_COLOR[role]}22`, color: ROLE_COLOR[role] };
}
function initials(name) {
  return name?.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2) || '?';
}
function fmtDate(d) {
  if (!d) return '—';
  return new Date(d.endsWith('Z') ? d : d + 'Z').toLocaleString(undefined, {
    month: 'short', day: 'numeric', year: 'numeric',
    hour: '2-digit', minute: '2-digit'
  });
}

// ── Modal ──────────────────────────────────────────────
function Modal({ title, onClose, children, footer }) {
  useEffect(() => {
    const handler = e => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [onClose]);
  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-header">
          <span className="modal-title">{title}</span>
          <button className="btn btn-ghost btn-sm" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">{children}</div>
        {footer && <div className="modal-footer">{footer}</div>}
      </div>
    </div>
  );
}

// ── Auth Page ──────────────────────────────────────────
function AuthPage({ onLogin }) {
  const [tab, setTab] = useState('login');
  const [form, setForm] = useState({ name: '', email: '', password: '', role: 'STUDENT' });
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  const set = k => e => setForm(f => ({ ...f, [k]: e.target.value }));

  async function submit(e) {
    e.preventDefault(); setError(''); setLoading(true);
    try {
      const path = tab === 'login' ? '/auth/login' : '/auth/register';
      const body = tab === 'login'
        ? { email: form.email, password: form.password }
        : { name: form.name, email: form.email, password: form.password, role: form.role };
      const data = await api(path, { method: 'POST', body });
      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));
      onLogin(data.user, data.token);
    } catch (e) { setError(e.message); } finally { setLoading(false); }
  }

  return (
    <div className="auth-page">
      <div className="auth-box">
        <div className="auth-logo">⬛ AuditDoc</div>
        <div className="auth-tagline">Immutable documents · Full audit trail · Role-based access</div>

        <div className="auth-tabs">
          {['login','register'].map(t => (
            <button key={t} className={`auth-tab ${tab === t ? 'active' : ''}`} onClick={() => { setTab(t); setError(''); }}>
              {t === 'login' ? 'Sign In' : 'Create Account'}
            </button>
          ))}
        </div>

        <form onSubmit={submit}>
          {tab === 'register' && (
            <div className="form-group">
              <label className="form-label">Full Name</label>
              <input className="form-input" placeholder="Your name" value={form.name} onChange={set('name')} required />
            </div>
          )}
          <div className="form-group">
            <label className="form-label">Email</label>
            <input className="form-input" type="email" placeholder="you@example.com" value={form.email} onChange={set('email')} required />
          </div>
          <div className="form-group">
            <label className="form-label">Password</label>
            <input className="form-input" type="password" placeholder={tab === 'register' ? 'Min. 6 characters' : '••••••••'} value={form.password} onChange={set('password')} required />
          </div>
          {tab === 'register' && (
            <div className="form-group">
              <label className="form-label">Role</label>
              <select className="form-select" value={form.role} onChange={set('role')}>
                <option value="STUDENT">Student — Create &amp; edit own documents</option>
                <option value="TEACHER">Teacher — Manage all documents, reports</option>
                <option value="HOD">HOD — Read-only admin, reports</option>
              </select>
            </div>
          )}
          {error && <div style={{ color: 'var(--red)', fontSize: 13, marginBottom: 12 }}>⚠ {error}</div>}
          <button className="btn btn-primary w-full" disabled={loading}>
            {loading ? 'Please wait…' : tab === 'login' ? 'Sign In' : 'Create Account'}
          </button>
        </form>
      </div>
    </div>
  );
}

// ── Dashboard ──────────────────────────────────────────
function Dashboard({ user, token, toast, setPage, setEditDoc }) {
  const [docs, setDocs] = useState([]);
  const [loading, setLoading] = useState(true);
  const [search, setSearch] = useState('');
  const [showCreate, setShowCreate] = useState(false);
  const [newTitle, setNewTitle] = useState('');
  const [newContent, setNewContent] = useState('');
  const [creating, setCreating] = useState(false);
  const [shareModal, setShareModal] = useState(null);

  async function load() {
    try {
      const data = await api('/documents', {}, token);
      setDocs(data);
    } catch (e) { toast.show(e.message, 'error'); }
    finally { setLoading(false); }
  }

  useEffect(() => { load(); }, []);

  async function createDoc(e) {
    e.preventDefault(); setCreating(true);
    try {
      await api('/documents', { method: 'POST', body: { title: newTitle, content: newContent } }, token);
      toast.show('Document created', 'success');
      setShowCreate(false); setNewTitle(''); setNewContent('');
      load();
    } catch (e) { toast.show(e.message, 'error'); } finally { setCreating(false); }
  }

  const filtered = docs.filter(d =>
    d.title.toLowerCase().includes(search.toLowerCase()) ||
    d.author?.toLowerCase().includes(search.toLowerCase())
  );

  const canCreate = user.role !== 'HOD';

  return (
    <div>
      {/* Stats */}
      <div className="stats-bar">
        <div className="stat-card">
          <div className="stat-value text-gold">{docs.length}</div>
          <div className="stat-label">Total Documents</div>
        </div>
        <div className="stat-card">
          <div className="stat-value" style={{ color: 'var(--teal)' }}>
            {docs.reduce((s, d) => s + (d.latest_version || 1), 0)}
          </div>
          <div className="stat-label">Total Versions</div>
        </div>
        {user.role !== 'STUDENT' && (
          <div className="stat-card">
            <div className="stat-value" style={{ color: 'var(--purple)' }}>
              {[...new Set(docs.map(d => d.created_by))].length}
            </div>
            <div className="stat-label">Contributors</div>
          </div>
        )}
        <div className="stat-card">
          <div className="stat-value" style={{ color: 'var(--green)' }}>
            {user.role.charAt(0) + user.role.slice(1).toLowerCase()}
          </div>
          <div className="stat-label">Your Role</div>
        </div>
      </div>

      <div className="section-header">
        <span className="section-title">Documents</span>
        <div className="flex-gap">
          <input className="search-input" placeholder="Search…" value={search} onChange={e => setSearch(e.target.value)} />
          {canCreate && (
            <button className="btn btn-primary" onClick={() => setShowCreate(true)}>+ New Document</button>
          )}
        </div>
      </div>

      {loading ? (
        <div className="empty-state"><div className="empty-icon">⋯</div><p>Loading…</p></div>
      ) : filtered.length === 0 ? (
        <div className="empty-state">
          <div className="empty-icon">📄</div>
          <h3>{search ? 'No results' : 'No documents yet'}</h3>
          <p>{canCreate ? 'Create your first document to get started.' : 'No documents to display.'}</p>
        </div>
      ) : (
        <div className="doc-grid">
          {filtered.map(doc => (
            <div key={doc.document_id} className="doc-item" onClick={() => { setEditDoc(doc); setPage('editor'); }}>
              <div className="doc-icon">📄</div>
              <div className="doc-info">
                <div className="doc-title">{doc.title}</div>
                <div className="doc-meta">
                  {user.role !== 'STUDENT' && <span>👤 {doc.author}</span>}
                  <span>🕐 {fmtDate(doc.last_modified)}</span>
                  <span className="ver-badge">v{doc.latest_version || 1}</span>
                </div>
              </div>
              <div className="doc-actions" onClick={e => e.stopPropagation()}>
                {['TEACHER','HOD'].includes(user.role) && (
                  <button className="btn btn-ghost btn-sm" onClick={() => setShareModal(doc)} title="Share">⇧</button>
                )}
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Create modal */}
      {showCreate && (
        <Modal title="Create New Document" onClose={() => setShowCreate(false)}
          footer={<>
            <button className="btn btn-secondary" onClick={() => setShowCreate(false)}>Cancel</button>
            <button className="btn btn-primary" onClick={createDoc} disabled={creating || !newTitle.trim()}>
              {creating ? 'Creating…' : 'Create Document'}
            </button>
          </>}>
          <div className="form-group">
            <label className="form-label">Document Title</label>
            <input className="form-input" placeholder="Enter title…" value={newTitle}
              onChange={e => setNewTitle(e.target.value)} autoFocus />
          </div>
          <div className="form-group">
            <label className="form-label">Initial Content</label>
            <textarea className="form-textarea" placeholder="Start writing…" value={newContent}
              onChange={e => setNewContent(e.target.value)} />
          </div>
        </Modal>
      )}

      {/* Share modal */}
      {shareModal && <ShareModal doc={shareModal} token={token} toast={toast} onClose={() => setShareModal(null)} />}
    </div>
  );
}

// ── Share Modal ────────────────────────────────────────
function ShareModal({ doc, token, toast, onClose }) {
  const [users, setUsers] = useState([]);
  const [selectedUser, setSelectedUser] = useState('');
  const [sharing, setSharing] = useState(false);

  useEffect(() => {
    api('/users', {}, token).then(setUsers).catch(() => {});
  }, []);

  async function share() {
    setSharing(true);
    try {
      await api('/share', { method: 'POST', body: { documentId: doc.document_id, sharedTo: selectedUser || null } }, token);
      toast.show('Document shared', 'success'); onClose();
    } catch (e) { toast.show(e.message, 'error'); } finally { setSharing(false); }
  }

  return (
    <Modal title={`Share — ${doc.title}`} onClose={onClose}
      footer={<>
        <button className="btn btn-secondary" onClick={onClose}>Cancel</button>
        <button className="btn btn-primary" onClick={share} disabled={sharing}>
          {sharing ? 'Sharing…' : 'Share Document'}
        </button>
      </>}>
      <div className="form-group">
        <label className="form-label">Share with (optional)</label>
        <select className="form-select" value={selectedUser} onChange={e => setSelectedUser(e.target.value)}>
          <option value="">— All users / Public —</option>
          {users.map(u => <option key={u.user_id} value={u.user_id}>{u.name} ({u.role})</option>)}
        </select>
      </div>
      <p className="text-muted" style={{ fontSize: 12 }}>Sharing will be logged in the audit trail.</p>
    </Modal>
  );
}

// ── Editor Page ────────────────────────────────────────
function EditorPage({ user, token, toast, editDoc, setEditDoc, setPage }) {
  const [doc, setDoc] = useState(null);
  const [versions, setVersions] = useState([]);
  const [content, setContent] = useState('');
  const [title, setTitle] = useState('');
  const [loading, setLoading] = useState(false);
  const [saving, setSaving] = useState(false);
  const [view, setView] = useState('editor'); // editor | history | diff
  const [diffV1, setDiffV1] = useState('');
  const [diffV2, setDiffV2] = useState('');
  const [diffResult, setDiffResult] = useState(null);
  const [diffLoading, setDiffLoading] = useState(false);
  const [showCreate, setShowCreate] = useState(false);
  const [newTitle, setNewTitle] = useState('');
  const [newContent, setNewContent] = useState('');
  const [creating, setCreating] = useState(false);

  // Load doc if editing existing
  useEffect(() => {
    if (editDoc) {
      setLoading(true);
      api(`/documents/${editDoc.document_id}`, {}, token)
        .then(d => {
          setDoc(d);
          setContent(d.latestVersion?.content || '');
          setTitle(d.title);
          loadVersions(d.document_id);
        })
        .catch(e => toast.show(e.message, 'error'))
        .finally(() => setLoading(false));
    }
  }, [editDoc]);

  async function loadVersions(docId) {
    try {
      const v = await api(`/documents/${docId}/versions`, {}, token);
      setVersions(v);
      if (v.length >= 2) { setDiffV1(String(v[v.length - 1].version_number)); setDiffV2(String(v[0].version_number)); }
    } catch {}
  }

  async function saveEdit() {
    if (!doc) return;
    setSaving(true);
    try {
      const res = await api(`/documents/${doc.document_id}/edit`, { method: 'POST', body: { content } }, token);
      toast.show(`Saved as version ${res.versionNumber}`, 'success');
      await loadVersions(doc.document_id);
    } catch (e) { toast.show(e.message, 'error'); } finally { setSaving(false); }
  }

  async function runDiff() {
    if (!diffV1 || !diffV2 || diffV1 === diffV2) return;
    setDiffLoading(true);
    try {
      const res = await api(`/documents/${doc.document_id}/compare?v1=${diffV1}&v2=${diffV2}`, {}, token);
      setDiffResult(res);
    } catch (e) { toast.show(e.message, 'error'); } finally { setDiffLoading(false); }
  }

  async function createDoc(e) {
    e.preventDefault(); setCreating(true);
    try {
      const res = await api('/documents', { method: 'POST', body: { title: newTitle, content: newContent } }, token);
      toast.show('Document created', 'success');
      setShowCreate(false);
      // Load the new doc
      const newDoc = await api(`/documents/${res.documentId}`, {}, token);
      setEditDoc({ document_id: res.documentId });
    } catch (e) { toast.show(e.message, 'error'); } finally { setCreating(false); }
  }

  const canEdit = (user.role !== 'HOD') && (doc ? (user.role === 'TEACHER' || doc.created_by === user.userId) : true);

  if (!editDoc) {
    return (
      <div>
        <div className="empty-state">
          <div className="empty-icon">✎</div>
          <h3>Create a New Document</h3>
          <p className="text-muted" style={{ marginBottom: 16 }}>Documents are immutable — every edit creates a new version.</p>
          {user.role !== 'HOD' && (
            <button className="btn btn-primary" onClick={() => setShowCreate(true)}>+ New Document</button>
          )}
        </div>
        {showCreate && (
          <Modal title="New Document" onClose={() => setShowCreate(false)}
            footer={<>
              <button className="btn btn-secondary" onClick={() => setShowCreate(false)}>Cancel</button>
              <button className="btn btn-primary" onClick={createDoc} disabled={creating || !newTitle.trim()}>
                {creating ? 'Creating…' : 'Create'}
              </button>
            </>}>
            <div className="form-group">
              <label className="form-label">Title</label>
              <input className="form-input" placeholder="Document title" value={newTitle} onChange={e => setNewTitle(e.target.value)} autoFocus />
            </div>
            <div className="form-group">
              <label className="form-label">Content</label>
              <textarea className="form-textarea" placeholder="Start writing…" value={newContent} onChange={e => setNewContent(e.target.value)} />
            </div>
          </Modal>
        )}
      </div>
    );
  }

  if (loading) return <div className="empty-state"><p>Loading document…</p></div>;

  return (
    <div>
      {/* Tabs */}
      <div className="flex-gap" style={{ marginBottom: 16, borderBottom: '1px solid var(--border)', paddingBottom: 12 }}>
        {['editor','history','diff'].map(v => (
          <button key={v} className={`btn ${view === v ? 'btn-primary' : 'btn-ghost'} btn-sm`} onClick={() => setView(v)}>
            {v === 'editor' ? '✎ Editor' : v === 'history' ? '◷ History' : '⊟ Compare'}
          </button>
        ))}
        <span className="ver-badge" style={{ marginLeft: 'auto' }}>v{versions[0]?.version_number || 1}</span>
        <button className="btn btn-ghost btn-sm" onClick={() => { setEditDoc(null); setPage('dashboard'); }}>← Back</button>
      </div>

      {/* Editor View */}
      {view === 'editor' && (
        <div className="editor-wrap">
          <div className="editor-toolbar">
            <div>
              <div style={{ fontFamily: 'var(--ff-display)', fontSize: 16, fontWeight: 600 }}>{title}</div>
              {doc && <div className="text-muted" style={{ fontSize: 12 }}>by {doc.author} · {fmtDate(doc.created_at)}</div>}
            </div>
            <div className="flex-gap">
              {!canEdit && <span className="text-muted" style={{ fontSize: 12 }}>View only</span>}
              {canEdit && (
                <button className="btn btn-primary btn-sm" onClick={saveEdit} disabled={saving}>
                  {saving ? 'Saving…' : '↑ Save Version'}
                </button>
              )}
            </div>
          </div>
          <div className="editor-area">
            <textarea
              value={content}
              onChange={e => setContent(e.target.value)}
              disabled={!canEdit}
              placeholder={canEdit ? "Start writing… (each save creates a new immutable version)" : "Read-only"}
              spellCheck={false}
            />
          </div>
          {doc && (
            <div className="card card-sm" style={{ fontSize: 12 }}>
              <div className="flex-between">
                <span className="text-muted">Document ID</span>
                <span className="hash-text">{doc.document_id}</span>
              </div>
              {versions[0] && (
                <div className="flex-between mt-1">
                  <span className="text-muted">Content Hash (v{versions[0].version_number})</span>
                  <span className="hash-text">{versions[0].hash?.slice(0, 40)}…</span>
                </div>
              )}
            </div>
          )}
        </div>
      )}

      {/* History View */}
      {view === 'history' && (
        <div>
          <div className="section-header">
            <span className="section-title">Version History — {versions.length} version{versions.length !== 1 ? 's' : ''}</span>
          </div>
          {versions.length === 0 ? (
            <div className="empty-state"><p>No versions found.</p></div>
          ) : (
            <div className="timeline">
              {versions.map((v, i) => (
                <div key={v.version_id} className="timeline-item">
                  <div className={`timeline-dot ${i === 0 ? 'latest' : 'old'}`} />
                  <div className={`timeline-card ${i === 0 ? 'latest' : ''}`}>
                    <div className="flex-between">
                      <div className="flex-gap">
                        <span className="ver-badge">v{v.version_number}</span>
                        {i === 0 && <span style={{ fontSize: 11, color: 'var(--gold)' }}>◆ Latest</span>}
                      </div>
                      <button className="btn btn-ghost btn-sm" onClick={() => { setContent(v.content); setView('editor'); }}>
                        View ↗
                      </button>
                    </div>
                    <div className="timeline-meta">
                      <span>👤 {v.editor}</span>
                      <span>🕐 {fmtDate(v.timestamp)}</span>
                      <span>{v.content.split('\n').length} lines · {v.content.length} chars</span>
                    </div>
                    <div className="hash-text mt-2">sha256: {v.hash}</div>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* Diff View */}
      {view === 'diff' && (
        <div>
          <div className="section-header mb-3">
            <span className="section-title">Compare Versions</span>
          </div>
          <div className="flex-gap mb-3" style={{ flexWrap: 'wrap' }}>
            <div>
              <label className="form-label">From Version</label>
              <select className="form-select" style={{ width: 140 }} value={diffV1} onChange={e => { setDiffV1(e.target.value); setDiffResult(null); }}>
                <option value="">Select…</option>
                {[...versions].reverse().map(v => <option key={v.version_id} value={String(v.version_number)}>v{v.version_number} — {v.editor}</option>)}
              </select>
            </div>
            <div>
              <label className="form-label">To Version</label>
              <select className="form-select" style={{ width: 140 }} value={diffV2} onChange={e => { setDiffV2(e.target.value); setDiffResult(null); }}>
                <option value="">Select…</option>
                {[...versions].reverse().map(v => <option key={v.version_id} value={String(v.version_number)}>v{v.version_number} — {v.editor}</option>)}
              </select>
            </div>
            <div style={{ alignSelf: 'flex-end' }}>
              <button className="btn btn-primary" onClick={runDiff} disabled={!diffV1 || !diffV2 || diffLoading}>
                {diffLoading ? 'Comparing…' : '⊟ Compare'}
              </button>
            </div>
          </div>
          {diffResult && (
            <div>
              <div className="diff-stats">
                <span className="diff-stat-added">+{diffResult.stats.added} added</span>
                <span className="diff-stat-removed">−{diffResult.stats.removed} removed</span>
                <span className="diff-stat-same">{diffResult.stats.unchanged} unchanged</span>
              </div>
              <div className="card" style={{ padding: 0, overflow: 'hidden', fontFamily: 'var(--ff-mono)' }}>
                {diffResult.diff.map((line, i) => (
                  <div key={i} className={`diff-line ${line.type}`}>
                    {line.line || ' '}
                  </div>
                ))}
              </div>
            </div>
          )}
          {!diffResult && !diffLoading && (
            <div className="empty-state" style={{ padding: 40 }}>
              <p>Select two versions and click Compare</p>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ── Reports Page ──────────────────────────────────────
function ReportsPage({ user, token, toast }) {
  const [reports, setReports] = useState([]);
  const [loading, setLoading] = useState(true);
  const [generating, setGenerating] = useState(false);
  const [viewReport, setViewReport] = useState(null);

  async function load() {
    try {
      const data = await api('/reports', {}, token);
      setReports(data);
    } catch (e) { toast.show(e.message, 'error'); } finally { setLoading(false); }
  }
  useEffect(() => { load(); }, []);

  async function generate() {
    setGenerating(true);
    try {
      const data = await api('/reports/generate', { method: 'POST', body: { type: 'FULL' } }, token);
      toast.show('Report generated', 'success');
      // Fetch full report
      const full = await api(`/reports/${data.reportId}`, {}, token);
      setViewReport(full);
      load();
    } catch (e) { toast.show(e.message, 'error'); } finally { setGenerating(false); }
  }

  async function loadReport(id) {
    try {
      const data = await api(`/reports/${id}`, {}, token);
      setViewReport(data);
    } catch (e) { toast.show(e.message, 'error'); }
  }

  return (
    <div>
      <div className="section-header">
        <span className="section-title">Reports</span>
        <button className="btn btn-primary" onClick={generate} disabled={generating}>
          {generating ? 'Generating…' : '◈ Generate Report'}
        </button>
      </div>

      {loading ? <div className="empty-state"><p>Loading…</p></div> :
        reports.length === 0 ? (
          <div className="empty-state">
            <div className="empty-icon">◈</div>
            <h3>No Reports Yet</h3>
            <p>Generate a report to see a full audit summary of all documents.</p>
          </div>
        ) : (
          <div className="doc-grid">
            {reports.map(r => (
              <div key={r.report_id} className="doc-item" onClick={() => loadReport(r.report_id)}>
                <div className="doc-icon">📊</div>
                <div className="doc-info">
                  <div className="doc-title">Report — {r.type}</div>
                  <div className="doc-meta">
                    <span>👤 {r.generatedBy}</span>
                    <span>🕐 {fmtDate(r.timestamp)}</span>
                  </div>
                </div>
              </div>
            ))}
          </div>
        )
      }

      {viewReport && (
        <Modal title={`Report — ${viewReport.type}`} onClose={() => setViewReport(null)}
          footer={<button className="btn btn-secondary" onClick={() => setViewReport(null)}>Close</button>}>
          {viewReport.data && (() => {
            const d = viewReport.data;
            return (
              <div>
                <div className="stats-bar" style={{ marginBottom: 16 }}>
                  <div className="stat-card card-sm">
                    <div className="stat-value text-gold" style={{ fontSize: 22 }}>{d.summary?.totalDocuments}</div>
                    <div className="stat-label">Documents</div>
                  </div>
                  <div className="stat-card card-sm">
                    <div className="stat-value" style={{ fontSize: 22, color: 'var(--teal)' }}>{d.summary?.totalUsers}</div>
                    <div className="stat-label">Users</div>
                  </div>
                </div>
                <div className="section-title mb-3" style={{ fontSize: 13 }}>Audit Summary</div>
                <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, marginBottom: 16 }}>
                  {d.summary?.auditSummary?.map(a => (
                    <div key={a.action} className="card card-sm" style={{ padding: '6px 12px' }}>
                      <span className={`action-badge action-${a.action}`}>{a.action}</span>
                      <span style={{ marginLeft: 8, fontSize: 13, fontWeight: 600 }}>{a.count}</span>
                    </div>
                  ))}
                </div>
                <div className="section-title mb-3" style={{ fontSize: 13 }}>Documents ({d.documents?.length})</div>
                {d.documents?.slice(0, 8).map(doc => (
                  <div key={doc.document_id} className="card card-sm mb-3" style={{ marginBottom: 8 }}>
                    <div className="flex-between">
                      <span style={{ fontSize: 13, fontWeight: 600 }}>{doc.title}</span>
                      <span className="ver-badge">v{doc.versionCount}</span>
                    </div>
                    <div className="text-muted" style={{ fontSize: 12 }}>by {doc.author}</div>
                  </div>
                ))}
              </div>
            );
          })()}
        </Modal>
      )}
    </div>
  );
}

// ── Audit Logs Page ────────────────────────────────────
function AuditPage({ user, token, toast }) {
  const [logs, setLogs] = useState([]);
  const [loading, setLoading] = useState(true);
  const [filter, setFilter] = useState('');

  useEffect(() => {
    api('/audit-logs?limit=200', {}, token)
      .then(setLogs)
      .catch(e => toast.show(e.message, 'error'))
      .finally(() => setLoading(false));
  }, []);

  const actions = ['CREATE_DOC','EDIT_DOC','VIEW_DOC','GENERATE_REPORT','SHARE_DATA'];
  const filtered = filter ? logs.filter(l => l.action === filter) : logs;

  return (
    <div>
      <div className="section-header">
        <span className="section-title">Audit Trail</span>
        <span className="text-muted" style={{ fontSize: 12 }}>{filtered.length} entries</span>
      </div>

      <div className="filter-bar">
        <button className={`btn btn-sm ${!filter ? 'btn-primary' : 'btn-secondary'}`} onClick={() => setFilter('')}>All</button>
        {actions.map(a => (
          <button key={a} className={`btn btn-sm ${filter === a ? 'btn-primary' : 'btn-secondary'}`} onClick={() => setFilter(a)}>
            {a.replace('_', ' ')}
          </button>
        ))}
      </div>

      {loading ? <div className="empty-state"><p>Loading…</p></div> :
        filtered.length === 0 ? (
          <div className="empty-state">
            <div className="empty-icon">◎</div>
            <h3>No audit logs</h3>
          </div>
        ) : (
          <div className="card" style={{ padding: 0, overflow: 'hidden' }}>
            <table className="audit-table">
              <thead>
                <tr>
                  <th>Action</th>
                  <th>User</th>
                  <th>Role</th>
                  <th>Resource</th>
                  <th>Timestamp</th>
                </tr>
              </thead>
              <tbody>
                {filtered.map(l => (
                  <tr key={l.log_id}>
                    <td><span className={`action-badge action-${l.action}`}>{l.action}</span></td>
                    <td style={{ fontWeight: 500 }}>{l.userName}</td>
                    <td><RoleBadge role={l.userRole} /></td>
                    <td><span className="hash-text">{l.resource_id?.slice(0, 18)}…</span></td>
                    <td className="text-muted" style={{ fontSize: 12 }}>{fmtDate(l.timestamp)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )
      }
    </div>
  );
}

// ── Page Titles ────────────────────────────────────────
const PAGE_META = {
  dashboard: { title: 'Dashboard', sub: 'All your documents in one place' },
  editor:    { title: 'Document Editor', sub: 'Immutable versioned editing' },
  reports:   { title: 'Reports', sub: 'Aggregate document & version data' },
  audit:     { title: 'Audit Logs', sub: 'Every action, permanently recorded' },
};

// ── Root App ───────────────────────────────────────────
function App() {
  const [user, setUser] = useState(() => { try { return JSON.parse(localStorage.getItem('user')); } catch { return null; } });
  const [token, setToken] = useState(() => localStorage.getItem('token'));
  const [page, setPage] = useState('dashboard');
  const [editDoc, setEditDoc] = useState(null);
  const toast = useToast();

  function handleLogin(u, t) { setUser(u); setToken(t); setPage('dashboard'); }

  function handleLogout() {
    localStorage.removeItem('token'); localStorage.removeItem('user');
    setUser(null); setToken(null); setEditDoc(null);
  }

  if (!user) return (
    <>
      <Toast toasts={toast.toasts} />
      <AuthPage onLogin={handleLogin} />
    </>
  );

  const meta = PAGE_META[page] || PAGE_META.dashboard;

  return (
    <div className="layout">
      <Toast toasts={toast.toasts} />
      <Sidebar user={user} page={page} setPage={p => { setPage(p); if (p !== 'editor') setEditDoc(null); }} onLogout={handleLogout} />
      <div className="main">
        <div className="topbar">
          <div>
            <div className="topbar-title">{meta.title}</div>
            <div className="topbar-sub">{meta.sub}</div>
          </div>
          <div className="flex-gap">
            <div className="user-avatar" style={{ ...avatarStyle(user.role), width: 32, height: 32 }}>{initials(user.name)}</div>
            <RoleBadge role={user.role} />
          </div>
        </div>
        <div className="content">
          {page === 'dashboard' && <Dashboard user={user} token={token} toast={toast} setPage={setPage} setEditDoc={setEditDoc} />}
          {page === 'editor'    && <EditorPage user={user} token={token} toast={toast} editDoc={editDoc} setEditDoc={setEditDoc} setPage={setPage} />}
          {page === 'reports'   && <ReportsPage user={user} token={token} toast={toast} />}
          {page === 'audit'     && <AuditPage user={user} token={token} toast={toast} />}
        </div>
      </div>
    </div>
  );
}

// ── Mount ──────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
