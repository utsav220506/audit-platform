<!DOCTYPE html>
<html>
<head>
  <title>Audit Platform</title>
  <link rel="stylesheet" href="/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<!-- AUTH -->
<div id="auth-page">
  <div class="auth-card">

    <h1>Audit Platform</h1>

    <div class="tabs">
      <button id="login-tab" class="active" onclick="switchTab('login')">Login</button>
      <button id="register-tab" onclick="switchTab('register')">Register</button>
    </div>

    <div id="login-form" class="form active">
      <input id="login-email" placeholder="Email">
      <input id="login-password" type="password" placeholder="Password">
      <button onclick="login()">Login</button>
    </div>

    <div id="register-form" class="form">
      <input id="reg-name" placeholder="Name">
      <input id="reg-email" placeholder="Email">
      <input id="reg-password" type="password" placeholder="Password">
      <select id="reg-role">
        <option value="STUDENT">Student</option>
        <option value="TEACHER">Teacher</option>
        <option value="HOD">HOD</option>
      </select>
      <button onclick="register()">Create Account</button>
    </div>

  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">

  <div class="sidebar">
    <h2>Audit</h2>
    <p id="role-display"></p>

    <button onclick="showSection('student')">Documents</button>
    <button onclick="showSection('teacher')">Audit Logs</button>
    <button onclick="showSection('hod')">Reports</button>
  </div>

  <div class="main">

    <div id="student-section" class="section active">
      <h2>Documents</h2>

      <div class="card">
        <input id="doc-title" placeholder="Title">
        <textarea id="doc-content"></textarea>
        <button onclick="createDoc()">Create</button>
      </div>

      <div class="card">
        <button onclick="getDocs()">Load Docs</button>
        <ul id="docs"></ul>
      </div>

      <div class="card">
        <input id="edit-id" placeholder="Doc ID">
        <textarea id="edit-content"></textarea>
        <button onclick="editDoc()">Update</button>
      </div>
    </div>

    <div id="teacher-section" class="section">
      <h2>Audit Logs</h2>
      <button onclick="getAudit()">Load</button>
      <ul id="audit"></ul>
    </div>

    <div id="hod-section" class="section">
      <h2>Reports</h2>
      <button onclick="generateReport()">Generate</button>
      <canvas id="chart"></canvas>
    </div>

  </div>

</div>

<script src="/script.js"></script>

</body>
</html>
